name: tests

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# The app has no build step and no committed package.json — Playwright is
# installed ad hoc here purely to drive tests.html in a headless browser.
jobs:
  money-math:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright (CI-only)
        run: |
          npm init -y
          npm install --no-save playwright@^1
          npx playwright install --with-deps chromium
      - name: Run money-math tests
        run: node scripts/run-tests.mjs

  doc-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check CSV/category contract against js/store/00-state.js
        run: node scripts/check-doc-drift.mjs
